<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JumpNav</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-shell ui-root">
      <header class="brand ui-panel">
        <div class="brand-main">
          <div class="brand-logo-shell">
            <img class="brand-logo" src="../logo48.png" alt="JumpNav logo" width="36" height="36" />
          </div>
          <div class="brand-text">
            <strong>JumpNav</strong>
            <span>AI Chat Navigator</span>
          </div>
        </div>
        <span id="version-pill" class="version-pill ui-pill" aria-label="Version">v3.3.2</span>
      </header>

      <section class="panel panel-settings ui-panel" id="feature-settings">
        <div class="section-head">
          <div class="section-copy">
            <h1>Features</h1>
            <p>Choose what stays active while you chat.</p>
          </div>
        </div>

        <div class="feature-list">
          <label class="feature-toggle" for="formula-enabled">
            <span class="feature-copy">
              <span class="feature-title">Formula Copy</span>
              <span class="feature-description">Copy formulas for Word or LaTeX in one click.</span>
            </span>
            <span class="feature-control">
              <input id="formula-enabled" class="feature-toggle-input" type="checkbox" />
              <span class="feature-switch" aria-hidden="true"></span>
            </span>
          </label>

          <label class="feature-toggle" for="prompt-entry-enabled">
            <span class="feature-copy">
              <span class="feature-title">Prompt Entry</span>
              <span class="feature-description">Keep the Prompt button ready in supported chats.</span>
            </span>
            <span class="feature-control">
              <input
                id="prompt-entry-enabled"
                class="feature-toggle-input"
                type="checkbox"
              />
              <span class="feature-switch" aria-hidden="true"></span>
            </span>
          </label>
        </div>
      </section>

      <section class="panel panel-support ui-panel" id="support-section">
        <div class="section-head">
          <div class="section-copy">
            <h1>Help Keep It Sharp</h1>
            <p>AI chat interfaces change quickly. Report anything that feels off.</p>
          </div>
        </div>
        <div class="button-grid">
          <button type="button" class="action-btn ui-button" data-link="bug">Report a Bug</button>
          <button type="button" class="action-btn ui-button" data-link="feature">Suggest a Feature</button>
        </div>
      </section>

      <section class="panel panel-growth ui-panel">
        <div class="section-head">
          <div class="section-copy">
            <h1>Enjoying JumpNav?</h1>
            <p>A quick star or review helps more people find it.</p>
          </div>
        </div>
        <div class="button-grid">
          <button type="button" class="action-btn ui-button" data-link="repo">Star on GitHub</button>
          <button type="button" class="action-btn ui-button" data-link="store">Rate on Web Store</button>
        </div>
      </section>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
