<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JumpNav</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-shell ui-root">
      <header class="brand">
        <div class="brand-main">
          <img class="brand-logo" src="../logo48.png" alt="JumpNav logo" width="36" height="36" />
          <div class="brand-text">
            <strong>JumpNav</strong>
            <span>AI Chat Navigator</span>
          </div>
        </div>
        <span id="version-pill" class="version-pill ui-pill" aria-label="Version">v3.3.1</span>
      </header>

      <section class="panel panel-settings ui-panel" id="feature-settings">
        <h1>Features</h1>
        <p>Toggle core features on supported AI chat sites.</p>

        <label class="toggle-row" for="formula-enabled">
          <input id="formula-enabled" type="checkbox" />
          <span>Enable formula click-to-copy</span>
        </label>

        <label class="toggle-row" for="prompt-entry-enabled">
          <input id="prompt-entry-enabled" type="checkbox" />
          <span>Show Prompt entry button</span>
        </label>
      </section>

      <section class="panel panel-support ui-panel" id="support-section">
        <h1>Let's Improve</h1>
        <p>AI platforms change frequently. If anything breaks, please let us know.</p>
        <div class="button-grid">
          <button type="button" class="action-btn ui-button" data-link="bug">Report a Bug</button>
          <button type="button" class="action-btn ui-button" data-link="feature">Suggest a Feature</button>
        </div>
      </section>

      <section class="panel panel-growth ui-panel">
        <h1>Love JumpNav?</h1>
        <p>If JumpNav saves you time, a star or review helps a lot.</p>
        <div class="button-grid">
          <button type="button" class="action-btn ui-button" data-link="repo">Star on GitHub</button>
          <button type="button" class="action-btn ui-button" data-link="store">Rate on Web Store</button>
        </div>
      </section>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
